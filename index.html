<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Wallpapers</title>

<style>

body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1{
  margin-top:20px;
}

.topbar{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px;
  flex-wrap:wrap;
}

input,select{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1c1c1c;
  color:white;
  font-size:16px;
}

#gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#111;
  border-radius:16px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:320px;
  object-fit:cover;
  cursor:pointer;
}

.buttons{
  display:flex;
  gap:8px;
  padding:10px;
}

.btn{
  flex:1;
  border:none;
  padding:10px;
  border-radius:10px;
  background:#ff3b3b;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#popup img{
  max-width:90%;
  max-height:90%;
  border-radius:20px;
}

.close{
  position:absolute;
  top:20px;
  right:25px;
  font-size:30px;
  color:white;
  cursor:pointer;
}

#loader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
  font-size:25px;
}

</style>
</head>

<body>

<div id="loader">Loading Wallpapers...</div>

<h1>🔥 AI Wallpapers</h1>

<div class="topbar">

<input
type="text"
id="search"
placeholder="Search wallpapers...">

<select id="filter">
<option value="all">All</option>
<option value="car">Cars</option>
<option value="naruto">Naruto</option>
<option value="anime">Anime</option>
<option value="nature">Nature</option>
<option value="space">Space</option>
<option value="gaming">Gaming</option>
<option value="bmw">BMW</option>
<option value="ferrari">Ferrari</option>
</select>

</div>

<div id="gallery"></div>

<div id="popup">
<span class="close" onclick="closePopup()">✖</span>
<img id="popupImg">
</div>

<script>

const_API_KEY = "55804332-c39398bb2e0b02b325f1b6ce6";

let currentPage = 1;
let loading = false;

async function loadWallpapers(reset=false){

  if(loading) return;

  loading = true;

  if(reset){
    currentPage = 1;
    document.getElementById("gallery").innerHTML="";
  }

  let search =
  document.getElementById("search").value.trim();

  let filter =
  document.getElementById("filter").value;

  let query = search || filter;

  if(query === "" || query === "all"){
    query = "4k wallpaper";
  }

  try{

    let response = await fetch(
`https://pixabay.com/api/?key=${API_KEY}&q=${encodeURIComponent(query)}&image_type=photo&orientation=vertical&per_page=50&page=${currentPage}&safesearch=true`
    );

    let data = await response.json();

    let gallery =
    document.getElementById("gallery");

    data.hits.forEach(img=>{

      let imageUrl = img.largeImageURL;

      gallery.innerHTML += `

      <div class="card">

      <img
      src="${imageUrl}"
      onclick="openPopup('${imageUrl}')">

      <div class="buttons">

      <button class="btn"
      onclick="downloadWallpaper('${imageUrl}')">
      Download
      </button>

      <button class="btn"
      onclick="shareWallpaper('${imageUrl}')">
      Share
      </button>

      </div>

      </div>
      `;
    });

    currentPage++;

  }catch(err){

    console.log(err);

  }

  document.getElementById("loader").style.display="none";

  loading = false;
}

function openPopup(url){

  document.getElementById("popup").style.display="flex";

  document.getElementById("popupImg").src=url;
}

function closePopup(){

  document.getElementById("popup").style.display="none";
}

function shareWallpaper(url){

  if(navigator.share){

    navigator.share({
      title:"Wallpaper",
      url:url
    });

  }else{

    alert("Sharing not supported");
  }
}

async function downloadWallpaper(url){

  const response = await fetch(url);

  const blob = await response.blob();

  const blobUrl = URL.createObjectURL(blob);

  const a = document.createElement("a");

  a.href = blobUrl;

  a.download = "wallpaper.jpg";

  document.body.appendChild(a);

  a.click();

  document.body.removeChild(a);
}

document
.getElementById("search")
.addEventListener("keyup", ()=>loadWallpapers(true));

document
.getElementById("filter")
.addEventListener("change", ()=>loadWallpapers(true));

window.addEventListener("scroll", ()=>{

  if(
    window.innerHeight + window.scrollY
    >= document.body.offsetHeight - 500
  ){

    loadWallpapers();
  }
});

loadWallpapers();

</script>

</body>
</html>
