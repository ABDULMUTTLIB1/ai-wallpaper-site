<!DOCTYPE html>
<html>
<head>
  <title>AI Wallpapers</title>
</head>
<body style="background:black; color:white; text-align:center">

<h1>🔥 AI Wallpapers</h1>

<div id="gallery"></div>

<script>
async function load() {
  let res = await fetch("wallpapers.json");
  let data = await res.json();

  let html = "";

  data.forEach(item => {
    html += `<img src="${item.url}" width="300" style="margin:10px"/>`;
  });

  document.getElementById("gallery").innerHTML = html;
}

load();
</script>

</body>
</html>
