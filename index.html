<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>🔥 AI Wallpaper Generator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

h1{
text-align:center;
padding:20px;
font-size:38px;
}

.topbar{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
padding:10px;
}

input,select{

padding:14px;
border:none;
border-radius:12px;
background:#1b1b1b;
color:white;
font-size:16px;

}

input{
width:250px;
}

button{

padding:14px 18px;
border:none;
border-radius:12px;

background:
linear-gradient(45deg,#ff0080,#ff3b3b);

color:white;
font-weight:bold;
cursor:pointer;

}

#gallery{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;

padding:15px;

}

.card{

background:#111;
border-radius:18px;
overflow:hidden;
border:1px solid #333;

}

.card img{

width:100%;
height:350px;
object-fit:cover;
cursor:pointer;

}

.buttons{

display:flex;
gap:8px;
padding:10px;

}

.btn{
flex:1;
}

#popup{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.95);

display:none;

justify-content:center;
align-items:center;

z-index:999;

}

#popup img{

max-width:90%;
max-height:90%;
border-radius:20px;

}

.close{

position:absolute;
top:20px;
right:25px;

font-size:35px;
cursor:pointer;

}

#loader{

text-align:center;
padding:20px;
font-size:22px;

}

</style>

</head>

<body>

<h1>🔥 AI Wallpaper Generator</h1>

<div class="topbar">

<input
type="text"
id="prompt"
placeholder="Search wallpapers...">

<select id="device">

<option value="mobile">
📱 Mobile
</option>

<option value="desktop">
💻 Desktop
</option>

<option value="4k">
🖥️ 4K
</option>

</select>

<button onclick="newSearch()">
Generate
</button>

</div>

<div id="loader">
Loading Wallpapers...
</div>

<div id="gallery"></div>

<div id="popup">

<span
class="close"
onclick="closePopup()">
✖
</span>

<img id="popupImg">

</div>

<script>

let loading = false;

function getSize(){

let device =
document.getElementById("device").value;

let width = 720;
let height = 1280;

if(device === "desktop"){

width = 1920;
height = 1080;

}

if(device === "4k"){

width = 3840;
height = 2160;

}

return {width,height};

}

async function generateWallpapers(){

if(loading) return;

loading = true;

let gallery =
document.getElementById("gallery");

let prompt =
document.getElementById("prompt")
.value
.trim();

if(prompt === ""){
prompt = "nature";
}

let size = getSize();

for(let i=0;i<12;i++){

let seed =
Math.floor(Math.random()*999999);

let imageUrl =
`https://picsum.photos/seed/${prompt+seed}/${size.width}/${size.height}`;

gallery.innerHTML += `

<div class="card">

<img
src="${imageUrl}"
loading="lazy"
onclick="openPopup('${imageUrl}')">

<div class="buttons">

<button
class="btn"
onclick="downloadWallpaper('${imageUrl}')">
Download
</button>

<button
class="btn"
onclick="shareWallpaper('${imageUrl}')">
Share
</button>

</div>

</div>

`;

}

loading = false;

document.getElementById("loader")
.innerHTML =
"Scroll down for more wallpapers";

}

function newSearch(){

document.getElementById("gallery")
.innerHTML = "";

generateWallpapers();

}

function openPopup(url){

document.getElementById("popup")
.style.display = "flex";

document.getElementById("popupImg")
.src = url;

}

function closePopup(){

document.getElementById("popup")
.style.display = "none";

}

async function downloadWallpaper(url){

try{

const response =
await fetch(url);

const blob =
await response.blob();

const blobUrl =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = blobUrl;

a.download = "wallpaper.jpg";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

URL.revokeObjectURL(blobUrl);

}catch(error){

alert("Download failed");

}

}

function shareWallpaper(url){

if(navigator.share){

navigator.share({

title:"Wallpaper",
url:url

});

}else{

alert("Sharing not supported");

}

}

window.onscroll = function(){

if(
window.innerHeight +
window.scrollY >=
document.body.offsetHeight - 200
){

generateWallpapers();

}

};

generateWallpapers();

</script>

</body>
</html>
