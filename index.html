<!DOCTYPE html>
<html>
<head>
  <title>AI Wallpapers</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 20px;
      font-size: 28px;
    }

    select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 20px;
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }

    .btn {
      display: block;
      padding: 10px;
      background: #ff4d4d;
      color: white;
      text-decoration: none;
      border-radius: 0 0 12px 12px;
    }

    .btn:hover {
      background: #ff1a1a;
    }
  </style>
</head>

<body>

<h1>🔥 AI Wallpapers</h1>

<select id="filter" onchange="load()">
  <option value="all">All</option>
  <option value="nature">Nature</option>
  <option value="cars">Cars</option>
  <option value="anime">Anime</option>
  <option value="space">Space</option>
</select>

<div id="gallery"></div>

<script>
async function load() {
  let res = await fetch("wallpapers.json");
  let data = await res.json();
  let filter = document.getElementById("filter").value;

  let html = "";

  data.reverse().forEach(item => {
    if (filter === "all" || item.category === filter) {
      html += `
        <div class="card">
          <img src="${item.url}" />
          <a class="btn" href="${item.url}" download>Download</a>
        </div>
      `;
    }
  });

  document.getElementById("gallery").innerHTML = html;
}

load();
</script>

</body>
</html>
