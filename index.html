<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 AI Wallpapers</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:
linear-gradient(to bottom,#050505,#111);
color:white;
text-align:center;
}

h1{
padding:20px;
font-size:38px;
}

.topbar{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
padding:10px;
}

input,select{
padding:12px;
border:none;
border-radius:10px;
background:#1c1c1c;
color:white;
font-size:16px;
}

#gallery{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:18px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 15px rgba(255,255,255,0.05);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px rgba(255,0,128,0.4);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
cursor:pointer;
}

.buttons{
display:flex;
gap:8px;
padding:10px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff0080,#ff3b3b);
color:white;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px rgba(255,0,128,0.5);
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(255,0,128,1);
}

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

#popup img{
max-width:90%;
max-height:90%;
border-radius:20px;
}

.close{
position:absolute;
top:20px;
right:25px;
font-size:35px;
cursor:pointer;
color:white;
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
font-size:25px;
}

</style>

</head>

<body>

<div id="loader">
Loading Wallpapers...
</div>

<h1>🔥 AI Wallpapers</h1>

<div class="topbar">

<input
type="text"
id="search"
placeholder="Search wallpapers...">

<select id="filter">

<option value="all">All</option>

<option value="nature">Nature</option>

<option value="mountains">Mountains</option>

<option value="forest">Forest</option>

<option value="sky">Sky</option>

<option value="space">Space</option>

<option value="anime">Anime</option>

<option value="naruto">Naruto</option>

<option value="dragon ball">Dragon Ball</option>

<option value="one piece">One Piece</option>

<option value="car">Cars</option>

<option value="bmw">BMW</option>

<option value="ferrari">Ferrari</option>

<option value="lamborghini">Lamborghini</option>

<option value="gaming">Gaming</option>

<option value="cyberpunk">Cyberpunk</option>

</select>

</div>

<div id="gallery"></div>

<div id="popup">

<span
class="close"
onclick="closePopup()">
✖
</span>

<img id="popupImg">

</div>

<script>

let page = 1;

let loading = false;

async function loadWallpapers(reset=false){

if(loading) return;

loading = true;

let searchInput =
document.getElementById("search");

let filterInput =
document.getElementById("filter");

let search = "";

let filter = "all";

if(searchInput){
search = searchInput.value.trim();
}

if(filterInput){
filter = filterInput.value;
}

let query = search || filter;

if(query === "" || query === "all"){
query = "wallpaper";
}

let gallery =
document.getElementById("gallery");

if(reset){
page = 1;
gallery.innerHTML = "";
}

for(let i=1;i<=30;i++){

let random =
Math.floor(Math.random()*999999);

let imageUrl =
`https://picsum.photos/seed/${query+random}/720/1280`;

gallery.innerHTML += `

<div class="card">

<img
src="${imageUrl}"
loading="lazy"
onclick="openPopup('${imageUrl}')">

<div class="buttons">

<button
class="btn"
onclick="downloadWallpaper('${imageUrl}')">
Download
</button>

<button
class="btn"
onclick="shareWallpaper('${imageUrl}')">
Share
</button>

<button
class="btn"
onclick="saveFavorite('${imageUrl}')">
❤️
</button>

</div>

</div>

`;
}

page++;

document.getElementById("loader")
.style.display = "none";

loading = false;
}

function openPopup(url){

document.getElementById("popup")
.style.display = "flex";

document.getElementById("popupImg")
.src = url;
}

function closePopup(){

document.getElementById("popup")
.style.display = "none";
}

function shareWallpaper(url){

if(navigator.share){

navigator.share({
title:"Wallpaper",
url:url
});

}else{

alert("Sharing not supported");
}
}

function saveFavorite(url){

let favs =
JSON.parse(localStorage.getItem("favs")) || [];

favs.push(url);

localStorage.setItem(
"favs",
JSON.stringify(favs)
);

alert("Saved ❤️");
}

async function downloadWallpaper(url){

try{

const response = await fetch(url);

const blob = await response.blob();

const blobUrl =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = blobUrl;

a.download = "wallpaper.jpg";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

}catch(error){

alert("Download failed");
}
}

window.addEventListener("scroll",()=>{

if(
window.innerHeight + window.scrollY
>= document.body.offsetHeight - 1000
){
loadWallpapers();
}
});

document
.getElementById("search")
.addEventListener(
"keyup",
()=>loadWallpapers(true)
);

document
.getElementById("filter")
.addEventListener(
"change",
()=>loadWallpapers(true)
);

loadWallpapers();

</script>

</body>
</html>
