<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 AI Wallpaper Generator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:
linear-gradient(to bottom,#050505,#111);
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
padding:20px;
font-size:38px;
}

.topbar{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
padding:10px;
}

input,select{
padding:14px;
border:none;
border-radius:12px;
background:#1c1c1c;
color:white;
font-size:16px;
}

input{
width:260px;
}

button{
padding:14px 18px;
border:none;
border-radius:12px;
background:
linear-gradient(45deg,#ff0080,#ff3b3b);
color:white;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px rgba(255,0,128,0.5);
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

#gallery{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:15px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:18px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 15px rgba(255,255,255,0.05);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:350px;
object-fit:cover;
cursor:pointer;
}

.buttons{
display:flex;
gap:8px;
padding:10px;
}

.btn{
flex:1;
}

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

#popup img{
max-width:90%;
max-height:90%;
border-radius:20px;
}

.close{
position:absolute;
top:20px;
right:25px;
font-size:35px;
cursor:pointer;
color:white;
}

#loader{
display:none;
font-size:24px;
padding:20px;
}

</style>

</head>

<body>

<h1>🔥 AI Wallpaper Generator</h1>

<div class="topbar">

<input
type="text"
id="prompt"
placeholder="Generate AI wallpaper...">

<select id="device">

<option value="mobile">
📱 Mobile Wallpapers
</option>

<option value="desktop">
💻 Desktop Wallpapers
</option>

<option value="4k">
🖥️ 4K Wallpapers
</option>

</select>

<button onclick="generateAI()">
Generate
</button>

</div>

<div id="loader">
Generating AI Wallpapers...
</div>

<div id="gallery"></div>

<div id="popup">

<span
class="close"
onclick="closePopup()">
✖
</span>

<img id="popupImg">

</div>

<script>

async function generateAI(){

let prompt =
document.getElementById("prompt")
.value
.trim();

if(prompt === ""){
prompt = "cyberpunk";
}

let device =
document.getElementById("device")
.value;

let width = 720;
let height = 1280;

if(device === "desktop"){

width = 1920;
height = 1080;
}

if(device === "4k"){

width = 3840;
height = 2160;
}

let gallery =
document.getElementById("gallery");

gallery.innerHTML = "";

document.getElementById("loader")
.style.display = "block";

for(let i=1;i<=12;i++){

let imageUrl =
`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + " ultra hd wallpaper " + i)}?width=${width}&height=${height}`;

gallery.innerHTML += `

<div class="card">

<img
src="${imageUrl}"
loading="lazy"
onclick="openPopup('${imageUrl}')">

<div class="buttons">

<button
class="btn"
onclick="downloadWallpaper('${imageUrl}')">
Download
</button>

<button
class="btn"
onclick="shareWallpaper('${imageUrl}')">
Share
</button>

</div>

</div>

`;
}

setTimeout(()=>{

document.getElementById("loader")
.style.display = "none";

},2000);
}

function openPopup(url){

document.getElementById("popup")
.style.display = "flex";

document.getElementById("popupImg")
.src = url;
}

function closePopup(){

document.getElementById("popup")
.style.display = "none";
}

function shareWallpaper(url){

if(navigator.share){

navigator.share({
title:"AI Wallpaper",
url:url
});

}else{

alert("Sharing not supported");
}
}

async function downloadWallpaper(url){

try{

const response = await fetch(url);

const blob = await response.blob();

const blobUrl =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = blobUrl;

a.download = "ai-wallpaper.jpg";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

}catch(error){

alert("Download failed");
}
}

generateAI();

</script>

</body>
</html>
