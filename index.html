<script>

function generateWallpapers(){

  let search = document
  .getElementById("search")
  .value
  .trim()
  .toLowerCase();

  let filter = document
  .getElementById("filter")
  .value
  .toLowerCase();

  let query = search || filter;

  if(query === "all" || query === ""){
    query = "wallpaper";
  }

  let gallery = document.getElementById("gallery");

  gallery.innerHTML = "";

  document.getElementById("loader").style.display = "block";

  for(let i=1; i<=50; i++){

    let random = Math.floor(Math.random()*100000);

    let imageUrl =
    `https://picsum.photos/720/1280?random=${random}`;

    gallery.innerHTML += `

    <div class="card">

      <img
      src="${imageUrl}"
      loading="lazy"
      onclick="openPopup('${imageUrl}')">

      <div class="buttons">

        <button class="btn"
        onclick="downloadWallpaper('${imageUrl}')">
        Download
        </button>

        <button class="btn"
        onclick="shareWallpaper('${imageUrl}')">
        Share
        </button>

      </div>

    </div>
    `;
  }

  setTimeout(()=>{
    document.getElementById("loader").style.display = "none";
  },1000);
}

function openPopup(url){

  document.getElementById("popup").style.display = "flex";

  document.getElementById("popupImg").src = url;
}

function closePopup(){

  document.getElementById("popup").style.display = "none";
}

function shareWallpaper(url){

  if(navigator.share){

    navigator.share({
      title:"Wallpaper",
      url:url
    });

  }else{

    alert("Sharing not supported");
  }
}

async function downloadWallpaper(url){

  try{

    const response = await fetch(url);

    const blob = await response.blob();

    const blobUrl = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = blobUrl;

    a.download = "wallpaper.jpg";

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);

    URL.revokeObjectURL(blobUrl);

  }catch(error){

    alert("Download failed");
  }
}

document
.getElementById("search")
.addEventListener("keyup", generateWallpapers);

document
.getElementById("filter")
.addEventListener("change", generateWallpapers);

generateWallpapers();

</script>
