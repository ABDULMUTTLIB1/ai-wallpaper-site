<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 AI Wallpapers</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

h1{
text-align:center;
padding:20px;
font-size:38px;
}

.topbar{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
padding:10px;
}

input,select{

padding:14px;
border:none;
border-radius:12px;
background:#1b1b1b;
color:white;
font-size:16px;

}

input{
width:250px;
}

button{

padding:14px 18px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff0080,#ff3b3b);
color:white;
font-weight:bold;
cursor:pointer;

}

#gallery{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;
padding:15px;

}

.card{

background:#111;
border-radius:18px;
overflow:hidden;
border:1px solid #333;

}

.card img{

width:100%;
height:350px;
object-fit:cover;
display:block;
cursor:pointer;

}

.buttons{

display:flex;
gap:8px;
padding:10px;

}

.btn{
flex:1;
}

#popup{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.96);

display:none;

flex-direction:column;
justify-content:center;
align-items:center;

z-index:999;

padding:20px;

}

#popup img{

max-width:95%;
max-height:75%;
border-radius:20px;

}

.popupButtons{

display:flex;
gap:10px;
margin-top:20px;

}

.close{

position:absolute;
top:20px;
right:25px;

font-size:35px;
cursor:pointer;

}

#loader{

text-align:center;
padding:20px;

}

</style>

</head>

<body>

<h1>🔥 AI Wallpapers</h1>

<div class="topbar">

<input
type="text"
id="search"
placeholder="Search wallpapers...">

<select id="device">

<option value="">
🖥️ Computer / 4K
</option>

<option value="vertical">
📱 Mobile
</option>

<option value="horizontal">
💻 Desktop
</option>

</select>

<button onclick="searchWallpapers(true)">
Search
</button>

</div>

<div id="loader">
Loading Wallpapers...
</div>

<div id="gallery"></div>

<div id="popup">

<span class="close"
onclick="closePopup()">
✖
</span>

<img id="popupImg">

<div class="popupButtons">

<button id="popupDownload">
Download
</button>

<button id="popupShare">
Share
</button>

</div>

</div>

<script>

const API_KEY =
"55804332-c39398bb2e0b02b325f1b6ce6";

let page = 1;
let loading = false;

async function searchWallpapers(reset=false){

if(loading) return;

loading = true;

let query =
document.getElementById("search")
.value.trim();

if(query === ""){
query = "wallpaper";
}

if(reset){

page = 1;

document.getElementById("gallery")
.innerHTML = "";

}

let orientation =
document.getElementById("device")
.value;

let orientationQuery = "";

if(orientation !== ""){

orientationQuery =
`&orientation=${orientation}`;

}

document.getElementById("loader")
.innerHTML =
"Loading Wallpapers...";

try{

let url =
`https://pixabay.com/api/?key=${API_KEY}&q=${encodeURIComponent(query)}&image_type=photo${orientationQuery}&per_page=16&page=${page}&safesearch=true`;

let response =
await fetch(url);

let data =
await response.json();

let gallery =
document.getElementById("gallery");

data.hits.forEach(photo => {

gallery.innerHTML += `

<div class="card">

<img
src="${photo.previewURL}"
loading="lazy"

onclick="
openPopup(
'${photo.webformatURL}',
'${photo.pageURL}'
)
">

<div class="buttons">

<button
class="btn"
onclick="
downloadWallpaper(
'${photo.pageURL}'
)
">
Download
</button>

<button
class="btn"
onclick="
shareWallpaper(
'${photo.pageURL}'
)
">
Share
</button>

</div>

</div>

`;

});

document.getElementById("loader")
.innerHTML =
"Scroll down for more wallpapers";

page++;

}catch(error){

document.getElementById("loader")
.innerHTML =
"Rate limit exceeded";

}

loading = false;

}

function openPopup(imageUrl,pageUrl){

document.getElementById("popup")
.style.display = "flex";

document.getElementById("popupImg")
.src = imageUrl;

document.getElementById("popupDownload")
.onclick = function(){

window.open(pageUrl,"_blank");

};

document.getElementById("popupShare")
.onclick = function(){

shareWallpaper(pageUrl);

};

}

function closePopup(){

document.getElementById("popup")
.style.display = "none";

}

function downloadWallpaper(url){

window.open(url,"_blank");

}

function shareWallpaper(url){

if(navigator.share){

navigator.share({

title:"Wallpaper",
url:url

});

}else{

window.open(url,"_blank");

}

}

window.addEventListener("scroll",()=>{

if(
window.innerHeight +
window.scrollY >=
document.body.offsetHeight - 700
){

searchWallpapers(false);

}

});

searchWallpapers();

</script>

</body>
</html>
