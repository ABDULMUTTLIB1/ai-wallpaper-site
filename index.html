<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 AI Wallpapers</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
text-align:center;
}

h1{
margin:20px 0;
font-size:40px;
}

.topbar{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

input,select{
padding:12px;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
font-size:16px;
}

#gallery{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#111;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 10px rgba(255,255,255,0.1);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
cursor:pointer;
}

.buttons{
display:flex;
gap:8px;
padding:10px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#ff3b3b;
color:white;
font-weight:bold;
cursor:pointer;
}

.btn:hover{
background:#ff0000;
}

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

#popup img{
max-width:90%;
max-height:90%;
border-radius:20px;
}

.close{
position:absolute;
top:20px;
right:25px;
font-size:35px;
cursor:pointer;
color:white;
}

</style>
</head>

<body>

<h1>🔥 AI Wallpapers</h1>

<div class="topbar">

<input
type="text"
id="search"
placeholder="Search wallpapers...">

<select id="filter">
<option value="all">All</option>
<option value="car">Cars</option>
<option value="nature">Nature</option>
<option value="anime">Anime</option>
<option value="naruto">Naruto</option>
<option value="dragon ball">Dragon Ball</option>
<option value="one piece">One Piece</option>
<option value="bmw">BMW</option>
<option value="ferrari">Ferrari</option>
<option value="space">Space</option>
<option value="gaming">Gaming</option>
</select>

</div>

<div id="gallery"></div>

<div id="popup">

<span class="close"
onclick="closePopup()">✖</span>

<img id="popupImg">

</div>

<script>

function loadWallpapers(){

let search =
document.getElementById("search")
.value
.trim();

let filter =
document.getElementById("filter")
.value;

let query = search || filter;

if(query === "" || query === "all"){
query = "wallpaper";
}

let gallery =
document.getElementById("gallery");

gallery.innerHTML = "";

for(let i=1;i<=60;i++){

let random =
Math.floor(Math.random()*999999);

let imageUrl =
`https://picsum.photos/seed/${query+random}/720/1280`;

gallery.innerHTML += `

<div class="card">

<img
src="${imageUrl}"
onclick="openPopup('${imageUrl}')">

<div class="buttons">

<button
class="btn"
onclick="downloadWallpaper('${imageUrl}')">
Download
</button>

<button
class="btn"
onclick="shareWallpaper('${imageUrl}')">
Share
</button>

</div>

</div>

`;
}
}

function openPopup(url){

document.getElementById("popup")
.style.display="flex";

document.getElementById("popupImg")
.src=url;
}

function closePopup(){

document.getElementById("popup")
.style.display="none";
}
