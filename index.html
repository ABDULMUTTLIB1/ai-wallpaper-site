<script>

const API_KEY =
"55804332-c39398bb2e0b02b325f1b6ce6";

let page = 1;
let loading = false;

async function searchWallpapers(reset=false){

if(loading) return;

loading = true;

let query =
document.getElementById("search")
.value.trim();

if(query === ""){
query = "wallpaper";
}

if(reset){

page = 1;

document.getElementById("gallery")
.innerHTML = "";

}

let orientation =
document.getElementById("device")
.value;

let orientationQuery = "";

if(orientation !== ""){

orientationQuery =
`&orientation=${orientation}`;

}

document.getElementById("loader")
.innerHTML =
"Loading Wallpapers...";

try{

let url =
`https://pixabay.com/api/?key=${API_KEY}&q=${encodeURIComponent(query)}&image_type=photo${orientationQuery}&per_page=16&page=${page}&safesearch=true`;

let response =
await fetch(url);

let data =
await response.json();

let gallery =
document.getElementById("gallery");

data.hits.forEach(photo => {

gallery.innerHTML += `

<div class="card">

<img

src="${photo.webformatURL}"

loading="lazy"

onclick="
openPopup(
'${photo.largeImageURL}'
)
">

<div class="buttons">

<button
class="btn"

onclick="
downloadWallpaper(
'${photo.largeImageURL}'
)
">

Download

</button>

<button
class="btn"

onclick="
shareWallpaper(
'${photo.largeImageURL}'
)
">

Share

</button>

</div>

</div>

`;

});

document.getElementById("loader")
.innerHTML =
"Scroll down for more wallpapers";

page++;

}catch(error){

document.getElementById("loader")
.innerHTML =
"API limit reached. Wait a little.";

}

loading = false;

}

function openPopup(imageUrl){

document.getElementById("popup")
.style.display = "flex";

document.getElementById("popupImg")
.src = imageUrl;

document.getElementById("popupDownload")
.onclick = function(){

downloadWallpaper(imageUrl);

};

document.getElementById("popupShare")
.onclick = function(){

shareWallpaper(imageUrl);

};

}

function closePopup(){

document.getElementById("popup")
.style.display = "none";

}

async function downloadWallpaper(url){

try{

const response =
await fetch(url);

const blob =
await response.blob();

const blobUrl =
window.URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = blobUrl;

a.download =
"wallpaper.jpg";

document.body.appendChild(a);

a.click();

a.remove();

window.URL.revokeObjectURL(blobUrl);

}catch{

alert("Download failed");

}

}

function shareWallpaper(url){

if(navigator.share){

navigator.share({

title:"Wallpaper",
url:url

});

}else{

window.open(url,"_blank");

}

}

window.addEventListener("scroll",()=>{

if(
window.innerHeight +
window.scrollY >=
document.body.offsetHeight - 700
){

searchWallpapers(false);

}

});

searchWallpapers();

</script>
