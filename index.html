<!DOCTYPE html>
<html>
<head>
  <title>AI Wallpapers</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
      text-align:center;
    }

    h1{
      padding:20px;
      font-size:32px;
    }

    #topbar{
      padding:10px;
    }

    select{
      padding:10px;
      border:none;
      border-radius:10px;
      background:#1e1e1e;
      color:white;
      font-size:16px;
    }

    #gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      padding:20px;
    }

    .card{
      background:#1a1a1a;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 0 15px rgba(0,0,0,0.5);
      transition:0.3s;
      position:relative;
    }

    .card:hover{
      transform:translateY(-5px) scale(1.03);
    }

    img{
      width:100%;
      height:380px;
      object-fit:cover;
      cursor:pointer;
    }

    .buttons{
      display:flex;
      gap:10px;
      padding:10px;
    }

    .btn{
      flex:1;
      padding:10px;
      border:none;
      border-radius:10px;
      background:#ff3c3c;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .btn:hover{
      background:#ff1a1a;
    }

    /* Fullscreen popup */

    #popup{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.95);
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    #popup img{
      width:90%;
      max-width:500px;
      height:auto;
      border-radius:20px;
    }

    #close{
      position:absolute;
      top:20px;
      right:30px;
      font-size:40px;
      cursor:pointer;
      color:white;
    }
  </style>
</head>

<body>

<h1>🔥 AI Wallpapers</h1>

<div id="topbar">
  <select id="filter" onchange="loadWallpapers()">
    <option value="all">All</option>
    <option value="nature">Nature</option>
    <option value="cars">Cars</option>
    <option value="anime">Anime</option>
    <option value="space">Space</option>
  </select>
</div>

<div id="gallery"></div>

<!-- Fullscreen popup -->

<div id="popup">
  <span id="close" onclick="closePopup()">×</span>
  <img id="popupImg">
</div>

<script>

async function loadWallpapers() {

  let res = await fetch("wallpapers.json");
  let data = await res.json();

  let filter = document.getElementById("filter").value;

  let html = "";

  data.reverse().forEach(item => {

    if(filter === "all" || item.category === filter){

      html += `
      <div class="card">

        <img src="${item.url}"
        onclick="openPopup('${item.url}')">

        <div class="buttons">

          <button class="btn"
          onclick="downloadWallpaper('${item.url}')">
          Download
          </button>

          <button class="btn"
          onclick="shareWallpaper('${item.url}')">
          Share
          </button>

        </div>

      </div>
      `;
    }

  });

  document.getElementById("gallery").innerHTML = html;
}

function openPopup(src){
  document.getElementById("popup").style.display="flex";
  document.getElementById("popupImg").src=src;
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function shareWallpaper(url){

  if(navigator.share){

    navigator.share({
      title:"AI Wallpaper",
      url:url
    });

  } else {

    alert("Sharing not supported");

  }
}

function downloadWallpaper(url){

  const link = document.createElement("a");

  link.href = url;
  link.target = "_blank";

  document.body.appendChild(link);

  link.click();

  document.body.removeChild(link);
}

loadWallpapers();

</script>

</body>
</html>
