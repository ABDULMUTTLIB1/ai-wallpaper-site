<script>

let page = 1;
let loading = false;

async function generateAI(){

if(loading) return;

loading = true;

let prompt =
document.getElementById("prompt")
.value
.trim();

if(prompt === ""){
prompt = "cyberpunk";
}

let device =
document.getElementById("device")
.value;

let width = 720;
let height = 1280;

if(device === "desktop"){
width = 1920;
height = 1080;
}

if(device === "4k"){
width = 3840;
height = 2160;
}

document.getElementById("loader")
.style.display = "block";

let gallery =
document.getElementById("gallery");

for(let i=1;i<=12;i++){

let seed =
Math.floor(Math.random()*999999);

let imageUrl =
`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + " ultra hd wallpaper")}?width=${width}&height=${height}&seed=${seed}`;

gallery.innerHTML += `

<div class="card">

<img
src="${imageUrl}"
loading="lazy"

onerror="
this.src='https://picsum.photos/${width}/${height}?random=${seed}'
"

onclick="openPopup('${imageUrl}')">

<div class="buttons">

<button
class="btn"
onclick="downloadWallpaper('${imageUrl}')">
Download
</button>

<button
class="btn"
onclick="shareWallpaper('${imageUrl}')">
Share
</button>

</div>

</div>

`;

}

document.getElementById("loader")
.style.display = "none";

loading = false;

page++;

}

function openPopup(url){

document.getElementById("popup")
.style.display = "flex";

document.getElementById("popupImg")
.src = url;
}

function closePopup(){

document.getElementById("popup")
.style.display = "none";
}

function shareWallpaper(url){

if(navigator.share){

navigator.share({
title:"AI Wallpaper",
url:url
});

}else{

alert("Sharing not supported");
}
}

async function downloadWallpaper(url){

try{

const response = await fetch(url);

const blob = await response.blob();

const blobUrl =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = blobUrl;

a.download = "ai-wallpaper.jpg";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

}catch(error){

alert("Download failed");
}
}

window.addEventListener("scroll",()=>{

if(
window.innerHeight +
window.scrollY >=
document.body.offsetHeight - 500
){

generateAI();

}

});

generateAI();

</script>
