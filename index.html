<script>

async function loadWallpapers() {

  let res = await fetch("wallpapers.json");
  let data = await res.json();

  let filter = document.getElementById("filter").value;

  let html = "";

  data.reverse().forEach(item => {

    if(filter === "all" || item.category === filter){

      html += `
      <div class="card">

        <img src="${item.url}"
        onclick="openPopup('${item.url}')">

        <div class="buttons">

          <button class="btn"
          onclick="downloadWallpaper('${item.url}')">
          Download
          </button>

          <button class="btn"
          onclick="shareWallpaper('${item.url}')">
          Share
          </button>

        </div>

      </div>
      `;
    }

  });

  document.getElementById("gallery").innerHTML = html;
}

function openPopup(src){

  document.getElementById("popup").style.display = "flex";

  document.getElementById("popupImg").src = src;
}

function closePopup(){

  document.getElementById("popup").style.display = "none";
}

function shareWallpaper(url){

  if(navigator.share){

    navigator.share({
      title:"AI Wallpaper",
      url:url
    });

  } else {

    alert("Sharing not supported");

  }
}

async function downloadWallpaper(url){

  try{

    const response = await fetch(url);

    const blob = await response.blob();

    const blobUrl = window.URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = blobUrl;

    a.download = "wallpaper.jpg";

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);

    window.URL.revokeObjectURL(blobUrl);

  } catch(error){

    alert("Download failed");

  }
}

loadWallpapers();

</script>
