<script>

const API_KEY = "PASTE_YOUR_PIXABAY_API_KEY";

async function generateWallpapers() {

  document.getElementById("loader").style.display = "block";

  let search = document
    .getElementById("search")
    .value
    .trim();

  let filter = document
    .getElementById("filter")
    .value;

  let query = search || filter;

  if (query === "" || query === "all") {
    query = "4k wallpaper";
  }

  let gallery = document.getElementById("gallery");

  gallery.innerHTML = "";

  try {

    let response = await fetch(
      `https://pixabay.com/api/?key=${API_KEY}&q=${encodeURIComponent(query)}&image_type=photo&orientation=vertical&per_page=50&safesearch=true`
    );

    let data = await response.json();

    data.hits.forEach(img => {

      let imageUrl = img.largeImageURL;

      gallery.innerHTML += `

      <div class="card">

        <img
          src="${imageUrl}"
          onclick="openPopup('${imageUrl}')">

        <div class="buttons">

          <button class="btn"
            onclick="downloadWallpaper('${imageUrl}')">
            Download
          </button>

          <button class="btn"
            onclick="shareWallpaper('${imageUrl}')">
            Share
          </button>

        </div>

      </div>
      `;
    });

  } catch (error) {

    gallery.innerHTML =
      "<p style='color:white'>Failed to load wallpapers</p>";
  }

  document.getElementById("loader").style.display = "none";
}

function openPopup(url) {

  document.getElementById("popup").style.display = "flex";

  document.getElementById("popupImg").src = url;
}

function closePopup() {

  document.getElementById("popup").style.display = "none";
}

function shareWallpaper(url) {

  if (navigator.share) {

    navigator.share({
      title: "Wallpaper",
      url: url
    });

  } else {

    alert("Sharing not supported");
  }
}

async function downloadWallpaper(url) {

  const response = await fetch(url);

  const blob = await response.blob();

  const blobUrl = window.URL.createObjectURL(blob);

  const a = document.createElement("a");

  a.href = blobUrl;

  a.download = "wallpaper.jpg";

  document.body.appendChild(a);

  a.click();

  a.remove();
}

document
  .getElementById("search")
  .addEventListener("keyup", generateWallpapers);

document
  .getElementById("filter")
  .addEventListener("change", generateWallpapers);

generateWallpapers();

</script>
