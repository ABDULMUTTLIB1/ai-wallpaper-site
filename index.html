<script>

let page = 1;
let loading = false;

async function loadWallpapers(reset=false){

if(loading) return;

loading = true;

let searchInput =
document.getElementById("search");

let filterInput =
document.getElementById("filter");

let search = "";
let filter = "all";

if(searchInput){
search = searchInput.value.trim();
}

if(filterInput){
filter = filterInput.value;
}

let query = search || filter;

if(query === "" || query === "all"){
query = "wallpaper";
}

let gallery =
document.getElementById("gallery");

if(reset){
page = 1;
gallery.innerHTML = "";
}

for(let i=1;i<=30;i++){

let random =
Math.floor(Math.random()*999999);

let imageUrl =
`https://picsum.photos/seed/${query+random}/720/1280`;

gallery.innerHTML += `

<div class="card">

<img
src="${imageUrl}"
loading="lazy"
onclick="openPopup('${imageUrl}')">

<div class="buttons">

<button
class="btn"
onclick="downloadWallpaper('${imageUrl}')">
Download
</button>

<button
class="btn"
onclick="shareWallpaper('${imageUrl}')">
Share
</button>

</div>

</div>

`;
}

page++;
loading = false;
}

function openPopup(url){

document.getElementById("popup")
.style.display = "flex";

document.getElementById("popupImg")
.src = url;
}

function closePopup(){

document.getElementById("popup")
.style.display = "none";
}

function shareWallpaper(url){

if(navigator.share){

navigator.share({
title:"Wallpaper",
url:url
});

}else{

alert("Sharing not supported");
}
}

async function downloadWallpaper(url){

try{

const response = await fetch(url);

const blob = await response.blob();

const blobUrl = URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = blobUrl;

a.download = "wallpaper.jpg";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

}catch(error){

alert("Download failed");
}
}

window.addEventListener("scroll",()=>{

if(
window.innerHeight + window.scrollY
>= document.body.offsetHeight - 1000
){
loadWallpapers();
}
});

document
.getElementById("search")
.addEventListener(
"keyup",
()=>loadWallpapers(true)
);

document
.getElementById("filter")
.addEventListener(
"change",
()=>loadWallpapers(true)
);

loadWallpapers();

</script>
