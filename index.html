<!DOCTYPE html>
<html>

<head>
  <title>AI Wallpapers</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#111;
      color:white;
      text-align:center;
    }

    h1{
      padding:20px;
    }

    #topbar{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    select, input{
      padding:12px;
      border-radius:10px;
      border:none;
      background:#222;
      color:white;
      font-size:16px;
    }

    input{
      width:220px;
    }

    /* LOADER */

    #loader{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:#111;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    .spin{
      width:60px;
      height:60px;
      border:6px solid #333;
      border-top:6px solid #ff3c3c;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    #loader p{
      margin-top:15px;
      color:white;
      font-size:18px;
    }

    #gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      padding:20px;
    }

    .card{
      background:#1a1a1a;
      border-radius:15px;
      overflow:hidden;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.03);
    }

    .card img{
      width:100%;
      height:350px;
      object-fit:cover;
    }

    .buttons{
      display:flex;
      gap:10px;
      padding:10px;
    }

    .btn{
      flex:1;
      padding:10px;
      border:none;
      border-radius:10px;
      background:#ff3c3c;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    .btn:hover{
      background:red;
    }

    #popup{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.95);
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    #popup img{
      width:90%;
      max-width:500px;
      border-radius:20px;
    }

    #close{
      position:absolute;
      top:20px;
      right:30px;
      font-size:40px;
      color:white;
      cursor:pointer;
    }

  </style>
</head>

<body>

<h1>🔥 AI Wallpapers</h1>

<div id="topbar">

<input
type="text"
id="search"
placeholder="Search wallpapers..."
onkeyup="loadWallpapers()">

<select id="filter" onchange="loadWallpapers()">
  <option value="all">All</option>
  <option value="nature">Nature</option>
  <option value="cars">Cars</option>
  <option value="anime">Anime</option>
  <option value="space">Space</option>
</select>

</div>

<!-- Loader -->

<div id="loader">
  <div class="spin"></div>
  <p>Loading Wallpapers...</p>
</div>

<div id="gallery"></div>

<!-- Popup -->

<div id="popup">
  <span id="close" onclick="closePopup()">×</span>
  <img id="popupImg">
</div>

<script>

async function loadWallpapers(){

  let response = await fetch("wallpapers.json");

  let data = await response.json();

  let filter = document.getElementById("filter").value;

  let search = document.getElementById("search").value.toLowerCase();

  let html = "";

  data.forEach(item => {

    let category = item.category.toLowerCase();

    if(
      (filter === "all" || item.category === filter)
      &&
      category.includes(search)
    ){

      html += `
      <div class="card">

        <img src="${item.url}"
        onclick="openPopup('${item.url}')">

        <div class="buttons">

          <button class="btn"
          onclick="downloadWallpaper('${item.url}')">
          Download
          </button>

          <button class="btn"
          onclick="shareWallpaper('${item.url}')">
          Share
          </button>

        </div>

      </div>
      `;
    }

  });

  document.getElementById("gallery").innerHTML = html;

  document.getElementById("loader").style.display = "none";
}

function openPopup(url){

  document.getElementById("popup").style.display = "flex";

  document.getElementById("popupImg").src = url;
}

function closePopup(){

  document.getElementById("popup").style.display = "none";
}

function shareWallpaper(url){

  if(navigator.share){

    navigator.share({
      title:"AI Wallpaper",
      url:url
    });

  }else{

    alert("Sharing not supported");
  }
}

async function downloadWallpaper(url){

  try{

    const response = await fetch(url);

    const blob = await response.blob();

    const blobUrl = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = blobUrl;

    a.download = "wallpaper.jpg";

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);

    URL.revokeObjectURL(blobUrl);

  }catch(error){

    alert("Download failed");
  }
}

loadWallpapers();

</script>

</body>
</html>
