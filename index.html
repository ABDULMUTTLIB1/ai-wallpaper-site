<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Wallpapers</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
text-align:center;
}

h1{
margin:20px;
}

.topbar{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

input,select{
padding:12px;
border:none;
border-radius:10px;
background:#1c1c1c;
color:white;
font-size:16px;
}

#gallery{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#111;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.buttons{
display:flex;
gap:8px;
padding:10px;
}

.btn{
flex:1;
border:none;
padding:10px;
border-radius:10px;
background:#ff3b3b;
color:white;
font-weight:bold;
}

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

#popup img{
max-width:90%;
max-height:90%;
border-radius:20px;
}

.close{
position:absolute;
top:20px;
right:25px;
font-size:30px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🔥 AI Wallpapers</h1>

<div class="topbar">

<input
type="text"
id="search"
placeholder="Search wallpapers...">

<select id="filter">

<option value="nature">Nature</option>
<option value="car">Cars</option>
<option value="anime">Anime</option>
<option value="naruto">Naruto</option>
<option value="dragonball">Dragon Ball</option>
<option value="onepiece">One Piece</option>
<option value="space">Space</option>

</select>

</div>

<div id="gallery"></div>

<div id="popup">

<span class="close"
onclick="closePopup()">✖</span>

<img id="popupImg">

</div>

<script>

const wallpapers = [

"https://images.unsplash.com/photo-1506744038136-46273834b3fb",

"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",

"https://images.unsplash.com/photo-1493246507139-91e8fad9978e",

"https://images.unsplash.com/photo-1519125323398-675f0ddb6308",

"https://images.unsplash.com/photo-1521747116042-5a810fda9664",

"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",

"https://images.unsplash.com/photo-1516117172878-fd2c41f4a759",

"https://images.unsplash.com/photo-1531256379411-0b9c9f3d5f4b"

];

function loadWallpapers(){

let gallery =
document.getElementById("gallery");

gallery.innerHTML="";

for(let i=0;i<wallpapers.length;i++){

let imageUrl = wallpapers[i];

gallery.innerHTML += `

<div class="card">

<img
src="${imageUrl}?w=720"
onclick="openPopup('${imageUrl}?w=1080')">

<div class="buttons">

<button
class="btn"
onclick="downloadWallpaper('${imageUrl}?w=1080')">
Download
</button>

<button
class="btn"
onclick="shareWallpaper('${imageUrl}')">
Share
</button>

</div>

</div>

`;
}
}

function openPopup(url){

document.getElementById("popup")
.style.display="flex";

document.getElementById("popupImg")
.src=url;
}

function closePopup(){

document.getElementById("popup")
.style.display="none";
}

function shareWallpaper(url){

if(navigator.share){

navigator.share({
title:"Wallpaper",
url:url
});

}else{

alert("Share not supported");
}
}

async function downloadWallpaper(url){

const response = await fetch(url);

const blob = await response.blob();

const blobUrl =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = blobUrl;

a.download = "wallpaper.jpg";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);
}

loadWallpapers();

</script>

</body>
</html>
