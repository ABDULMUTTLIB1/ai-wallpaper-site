- name: Commit & Push
  run: |
    git config --global user.name "bot"
    git config --global user.email "bot@mail.com"
    
    # clean state
    git fetch origin
    git reset --hard origin/main
    
    # add new changes
    git add .
    git commit -m "auto wallpapers" || echo "No changes"
    
    # push force (important)
    git push origin main --force
